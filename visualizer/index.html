<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>基盤結合試験 連携可視化</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="product-label">Infrastructure Integration Test Map</p>
          <h1>基盤連携と試験網羅性</h1>
        </div>
        <div class="file-panel" aria-label="CSV読み込み">
          <div class="file-inputs">
            <label>
              構成要素
              <input id="componentsFile" type="file" accept=".csv" />
            </label>
            <label>
              結合点
              <input id="integrationsFile" type="file" accept=".csv" />
            </label>
            <label>
              観点
              <input id="coverageFile" type="file" accept=".csv" />
            </label>
            <button id="sampleButton" type="button">サンプル表示</button>
          </div>
          <div class="action-panel" aria-label="編集操作">
            <button id="editModeButton" type="button">編集モード開始</button>
            <button id="addComponentButton" type="button">製品追加</button>
            <button id="startConnectionButton" type="button">線を引く</button>
              <button id="autoLayoutButton" type="button">自動整列</button>
              <button id="exportJsonButton" type="button">JSON保存</button>
              <button id="exportCsvButton" type="button">CSV保存</button>
              <button id="importJsonButton" type="button">JSON読込</button>
              <input id="jsonFileInput" type="file" accept=".json" hidden />
              <button id="importProposalButton" type="button">提案JSON読込</button>
              <button id="exportProposalTemplateButton" type="button">提案JSON雛形出力</button>
              <input id="proposalFileInput" type="file" accept=".json" hidden />
            </div>
          </div>
        </header>

      <section class="toolbar" aria-label="表示条件">
        <label>
          重要度
          <select id="criticalityFilter">
            <option value="ALL">すべて</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </label>
        <label>
          担当
          <select id="ownerFilter">
            <option value="ALL">すべて</option>
          </select>
        </label>
        <label>
          連携種別
          <select id="integrationTypeFilter">
            <option value="ALL">すべて</option>
          </select>
        </label>
        <label class="toggle">
          <input id="openOnlyFilter" type="checkbox" />
          要確認リスクあり
        </label>
        <label class="toggle">
          <input id="showSecondaryFilter" type="checkbox" />
          補助連携を表示
        </label>
        <div id="pendingConnectionControls" class="connection-toolbar" hidden>
          <label>
            向き
            <select id="pendingConnectionDirectionSelect">
              <option value="output">出力</option>
              <option value="input">入力</option>
              <option value="bidirectional">相互連携</option>
            </select>
          </label>
          <label>
            図の扱い
            <select id="pendingConnectionDiagramSelect">
              <option value="core">主連携</option>
              <option value="secondary">補助連携</option>
            </select>
          </label>
          <button id="cancelPendingConnectionToolbarButton" type="button">中止</button>
        </div>
      </section>

      <section class="summary-strip" id="summaryStrip"></section>

      <section class="workspace">
        <section class="map-panel" aria-label="連携図">
          <div class="panel-title">
            <div>
              <p class="kicker">Topology</p>
              <h2>製品間連携図</h2>
            </div>
              <div class="legend">
                <span><i class="line core"></i>主連携</span>
                <span><i class="line secondary"></i>補助連携</span>
                <span><i class="legend-arrow right"></i>出力</span>
                <span><i class="legend-arrow left"></i>入力</span>
                <span><i class="legend-arrow both"></i>相互連携</span>
                <span><i class="badge danger"></i>未完了</span>
              </div>
          </div>
          <svg id="mapSvg" viewBox="0 0 1280 760" role="img" aria-label="システム基盤の製品間連携図"></svg>
        </section>
      </section>

      <div id="detailModal" class="detail-modal" aria-hidden="true">
        <div id="detailModalBackdrop" class="detail-modal-backdrop"></div>
        <section class="detail-modal-card" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle">
          <div class="panel-title detail-modal-head">
            <div>
              <p class="kicker">Selected Link</p>
              <h2 id="detailModalTitle">結合点詳細</h2>
            </div>
            <button id="closeDetailModalButton" class="detail-close-button" type="button">閉じる</button>
          </div>
          <div class="detail-modal-body">
            <div class="detail-pane">
              <div class="pane-title">確認</div>
              <div id="selectedDetail" class="selected-detail"></div>
            </div>
            <div class="editor-pane">
              <div class="pane-title">編集</div>
              <div id="editorPanel" class="editor-panel"></div>
            </div>
          </div>
        </section>
      </div>

      <div id="proposalModal" class="detail-modal" aria-hidden="true">
        <div id="proposalModalBackdrop" class="detail-modal-backdrop"></div>
        <section class="detail-modal-card proposal-modal-card" role="dialog" aria-modal="true" aria-labelledby="proposalModalTitle">
          <div class="panel-title detail-modal-head">
            <div>
              <p class="kicker">LLM Proposal</p>
              <h2 id="proposalModalTitle">提案差分レビュー</h2>
            </div>
            <button id="closeProposalModalButton" class="detail-close-button" type="button">閉じる</button>
          </div>
          <div id="proposalSummary" class="proposal-summary"></div>
          <div class="proposal-actions">
            <button id="proposalSelectAllButton" type="button">全選択</button>
            <button id="proposalClearAllButton" type="button">全解除</button>
            <button id="applyProposalButton" type="button">選択分を反映</button>
          </div>
          <div id="proposalReview" class="proposal-review"></div>
        </section>
      </div>

        <section class="tables">
          <section class="table-panel">
            <div class="panel-title">
              <div>
                <p class="kicker">Risks</p>
              <h2>未完了リスク</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table id="riskTable">
              <thead>
                <tr>
                  <th>結合ID</th>
                  <th>連携</th>
                  <th>種別</th>
                  <th>進捗</th>
                  <th>重要度</th>
                  <th>リスク</th>
                  <th>担当</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <section class="table-panel">
          <div class="panel-title">
            <div>
              <p class="kicker">Coverage</p>
              <h2>観点マトリクス</h2>
            </div>
          </div>
            <div class="table-wrap">
              <table id="coverageTable">
                <thead></thead>
                <tbody></tbody>
              </table>
            </div>
          </section>

          <section class="table-panel table-panel-wide">
            <div class="panel-title">
              <div>
                <p class="kicker">Product Matrix</p>
                <h2>製品間確認マトリクス</h2>
              </div>
            </div>
            <div class="table-wrap matrix-wrap">
              <table id="productMatrixTable">
                <thead></thead>
                <tbody></tbody>
              </table>
            </div>
          </section>
        </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
